<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE082"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="30" fill="url(#coinGrad)" filter="url(#shadow)"/>
  <!-- Inner circle border -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#E6A800" stroke-width="2" opacity="0.6"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="23" fill="url(#innerGrad)"/>
  <!-- Pine tree symbol -->
  <polygon points="32,14 24,28 28,26 22,36 27,34 20,44 44,44 37,34 42,36 36,26 40,28" fill="#2E7D32" opacity="0.85"/>
  <!-- Trunk -->
  <rect x="30" y="44" width="4" height="6" rx="1" fill="#5D4037" opacity="0.85"/>
  <!-- Shine -->
  <ellipse cx="24" cy="22" rx="6" ry="10" fill="white" opacity="0.15" transform="rotate(-20,24,22)"/>
</svg>
